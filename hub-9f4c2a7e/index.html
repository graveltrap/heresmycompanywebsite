<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>Prospect Hub — locked</title>
<style>
:root{--bg:#0f1216;--panel:#171b21;--card:#1d232b;--ink:#e8ecf1;--mut:#96a0ad;--acc:#4fd1c5;--line:#2a323c}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;padding:0}
.wrap{max-width:1100px;margin:0 auto;padding:2rem 1.2rem 4rem}
.top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;border-bottom:1px solid var(--line);padding-bottom:1rem}
.kicker{color:var(--acc);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
h1{font-size:1.9rem;letter-spacing:-.01em}
.stats{display:flex;gap:1.1rem;flex-wrap:wrap}
.stats span{color:var(--mut);font-size:.85rem}.stats b{color:var(--ink);font-size:1.05rem}
.sub{color:var(--mut);font-size:.85rem;margin:1rem 0 1.5rem;max-width:60ch}
.region{margin-top:2rem}
.rhead{display:flex;align-items:baseline;gap:.8rem;border-left:3px solid var(--acc);padding-left:.7rem;margin-bottom:1rem}
.rhead h2{font-size:1.15rem}.rhead span{color:var(--mut);font-size:.8rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:1rem}
.row1{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem}
.card h3{font-size:1.02rem;line-height:1.25}
.badge{font-size:.62rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:.2rem .45rem;border-radius:999px;white-space:nowrap}
.badge.t1{background:#123a32;color:#4fd1c5}.badge.t2{background:#3a2f12;color:#e6b34f}.badge.show{background:#33203a;color:#c77dff}
.addr{color:var(--mut);font-size:.82rem;margin-top:.35rem}
.meta{color:var(--ink);font-size:.8rem;margin-top:.3rem;opacity:.9}
.note{color:var(--mut);font-size:.76rem;margin-top:.4rem;font-style:italic}
.links{display:flex;align-items:center;gap:.6rem;margin-top:.7rem;flex-wrap:wrap}
.btn{background:var(--acc);color:#06201d;font-weight:700;font-size:.76rem;padding:.32rem .6rem;border-radius:7px;text-decoration:none}
.lnk{color:var(--acc);font-size:.76rem;text-decoration:none;border-bottom:1px solid transparent}.lnk:hover{border-color:var(--acc)}
.links code{color:var(--mut);font-size:.72rem;margin-left:auto}
.foot{color:var(--mut);font-size:.74rem;margin-top:2.5rem;border-top:1px solid var(--line);padding-top:1rem}
.gate{max-width:340px;margin:22vh auto;text-align:center;padding:0 1rem}
.gate h1{font-size:1.2rem;margin-bottom:.3rem}.gate p{color:var(--mut);font-size:.85rem;margin-bottom:1.2rem}
.gate input{width:100%;padding:.7rem .8rem;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--ink);font-size:1rem}
.gate button{width:100%;margin-top:.7rem;padding:.7rem;border:0;border-radius:9px;background:var(--acc);color:#06201d;font-weight:700;font-size:.95rem;cursor:pointer}
.gate .rm{display:flex;align-items:center;gap:.4rem;justify-content:center;margin-top:.8rem;color:var(--mut);font-size:.8rem}
.err{color:#ff6b6b;font-size:.82rem;min-height:1.2em;margin-top:.6rem}
</style></head><body>
<div id="gate" class="gate">
  <h1>Prospect Hub</h1>
  <p>Private. Enter password to unlock.</p>
  <input id="pw" type="password" autocomplete="current-password" placeholder="Password" autofocus>
  <button id="go">Unlock</button>
  <label class="rm"><input id="rm" type="checkbox"> Remember on this device</label>
  <div id="err" class="err"></div>
</div>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function keyFrom(pw){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:b64(P.salt), iterations:P.iter, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
async function unlock(pw, remember){
  const key = await keyFrom(pw);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(P.iv)}, key, b64(P.ct));
  document.getElementById("app").innerHTML = new TextDecoder().decode(pt);
  document.getElementById("gate").style.display = "none";
  if(remember) localStorage.setItem("hubpw", pw);
}
async function attempt(pw, remember){
  try{ await unlock(pw, remember); }
  catch(e){ localStorage.removeItem("hubpw");
    document.getElementById("err").textContent = "Wrong password."; }
}
document.getElementById("go").onclick = () =>
  attempt(document.getElementById("pw").value, document.getElementById("rm").checked);
document.getElementById("pw").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("go").click(); });
const saved = localStorage.getItem("hubpw");
if(saved) attempt(saved, true);
